<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K9 Audit Dashboard</title>
<style>
  :root {
    --bg: #0f1117; --bg2: #1a1d27; --bg3: #232635;
    --border: #2e3248; --text: #e2e4f0; --muted: #7b7f9e;
    --green: #22c55e; --red: #ef4444; --amber: #f59e0b;
    --blue: #3b82f6; --purple: #a78bfa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; }

  /* ── Top bar ── */
  .topbar { background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 12px 24px; display: flex; align-items: center; gap: 16px; }
  .topbar h1 { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: .02em; }
  .topbar h1 span { color: var(--amber); }
  .conn-form { display: flex; gap: 8px; margin-left: auto; }
  .conn-form input { background: var(--bg3); border: 1px solid var(--border); color: var(--text);
    padding: 5px 10px; border-radius: 6px; font-size: 12px; outline: none; }
  .conn-form input:focus { border-color: var(--blue); }
  .btn { background: var(--blue); color: #fff; border: none; padding: 5px 14px;
    border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500; }
  .btn:hover { opacity: .85; }
  .btn.sm { padding: 3px 10px; font-size: 11px; }
  .btn.ghost { background: var(--bg3); border: 1px solid var(--border); color: var(--muted); }
  .badge { display: inline-block; padding: 1px 7px; border-radius: 99px; font-size: 11px; font-weight: 600; }
  .badge.pass { background: #14532d; color: var(--green); }
  .badge.fail { background: #450a0a; color: var(--red); }
  .badge.warn { background: #451a03; color: var(--amber); }

  /* ── Layout ── */
  .main { display: grid; grid-template-columns: 220px 1fr; height: calc(100vh - 49px); }
  .sidebar { background: var(--bg2); border-right: 1px solid var(--border);
    padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; overflow-y: auto; }
  .content { overflow-y: auto; padding: 20px 24px; }

  /* ── Sidebar nav ── */
  .nav-item { padding: 7px 10px; border-radius: 6px; cursor: pointer; color: var(--muted);
    display: flex; align-items: center; gap: 8px; transition: all .15s; }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active { background: var(--bg3); color: var(--blue); }
  .nav-section { font-size: 10px; color: var(--muted); padding: 12px 10px 4px; letter-spacing: .08em; text-transform: uppercase; }

  /* ── Stat cards ── */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
  .stat-card .label { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .stat-card .value { font-size: 24px; font-weight: 700; }
  .stat-card .value.green { color: var(--green); }
  .stat-card .value.red   { color: var(--red); }
  .stat-card .value.amber { color: var(--amber); }
  .stat-card .value.blue  { color: var(--blue); }

  /* ── Table ── */
  .table-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .table-header { padding: 10px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px; }
  .table-header h3 { font-size: 13px; font-weight: 600; flex: 1; }
  .filter-row { display: flex; gap: 8px; padding: 10px 16px; border-bottom: 1px solid var(--border); }
  .filter-row select, .filter-row input {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text);
    padding: 4px 8px; border-radius: 5px; font-size: 11px; outline: none; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 8px 16px; font-size: 11px; color: var(--muted);
    border-bottom: 1px solid var(--border); font-weight: 500; text-transform: uppercase; letter-spacing: .06em; }
  td { padding: 9px 16px; border-bottom: 1px solid var(--border); vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg3); cursor: pointer; }
  .mono { font-family: 'SF Mono', monospace; font-size: 11px; color: var(--muted); }

  /* ── Detail panel ── */
  .detail { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
    padding: 16px; margin-top: 16px; display: none; }
  .detail.open { display: block; }
  .detail h4 { font-size: 12px; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: .06em; }
  .cieu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .cieu-block { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; }
  .cieu-block .title { font-size: 10px; color: var(--blue); font-weight: 600; margin-bottom: 6px; letter-spacing: .08em; }
  .cieu-block pre { font-size: 11px; color: var(--text); white-space: pre-wrap; word-break: break-all; max-height: 180px; overflow-y: auto; }
  .violation-item { background: #450a0a; border: 1px solid #7f1d1d; border-radius: 5px;
    padding: 7px 10px; margin-top: 6px; font-size: 11px; }
  .violation-item .vtype { color: var(--red); font-weight: 600; }

  /* ── Pagination ── */
  .pagination { display: flex; gap: 6px; align-items: center; padding: 12px 16px; justify-content: flex-end; }
  .page-info { color: var(--muted); font-size: 11px; flex: 1; padding-left: 16px; }

  /* ── Empty / loading states ── */
  .empty { text-align: center; padding: 48px; color: var(--muted); }
  .loading { text-align: center; padding: 32px; color: var(--muted); }
  #status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); display: inline-block; }
  #status-dot.ok { background: var(--green); }
  #status-dot.err { background: var(--red); }
</style>
</head>
<body>

<div class="topbar">
  <h1>🐕‍🦺 <span>K9</span> Audit Dashboard</h1>
  <span id="status-dot"></span>
  <span id="status-text" style="font-size:11px;color:var(--muted)">未连接</span>
  <div class="conn-form">
    <input id="inp-endpoint" placeholder="http://127.0.0.1:8000" value="http://127.0.0.1:8000" style="width:200px">
    <input id="inp-apikey"   placeholder="api_key" type="password" style="width:120px">
    <button class="btn" onclick="connect()">连接</button>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="nav-section">视图</div>
    <div class="nav-item active" onclick="setView('overview')">📊 总览</div>
    <div class="nav-item" onclick="setView('records')">📋 所有记录</div>
    <div class="nav-item" onclick="setView('violations')">🚨 违规记录</div>
    <div class="nav-section">信息</div>
    <div class="nav-item" id="nav-workspace" style="font-size:11px;color:var(--muted);cursor:default"></div>
  </div>

  <div class="content" id="content">
    <div class="empty">输入服务端地址和 API Key，点击「连接」</div>
  </div>
</div>

<!-- Detail panel (shared) -->
<div class="detail" id="detail-panel">
  <h4>CIEU 五元组详情</h4>
  <div class="cieu-grid" id="cieu-grid"></div>
</div>

<script>
let API = '', KEY = '', currentView = 'overview';
let allRecords = [], totalCount = 0, page = 0, pageSize = 50;
let violationsOnly = false;

async function apiFetch(path, params='') {
  const r = await fetch(API + path + params, {
    headers: { Authorization: 'Bearer ' + KEY }
  });
  if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
  return r.json();
}

let _ws = null;

async function connect() {
  API = document.getElementById('inp-endpoint').value.replace(/\/$/, '');
  KEY = document.getElementById('inp-apikey').value;
  try {
    await fetch(API + '/health');
    const s = await apiFetch('/api/status');
    document.getElementById('status-dot').className = 'ok';
    document.getElementById('status-text').textContent = '已连接';
    document.getElementById('nav-workspace').textContent = 'ws: ' + s.workspace.slice(0,12) + '...';
    setView(currentView);
    _connectWebSocket();
  } catch(e) {
    document.getElementById('status-dot').className = 'err';
    document.getElementById('status-text').textContent = '连接失败';
    document.getElementById('content').innerHTML = '<div class="empty">连接失败：' + e.message + '</div>';
  }
}

function _connectWebSocket() {
  if (_ws) { _ws.close(); _ws = null; }
  const wsUrl = API.replace(/^http/, 'ws') + '/ws?api_key=' + encodeURIComponent(KEY);
  try {
    _ws = new WebSocket(wsUrl);
    _ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        if (msg.type === 'new_records' && msg.accepted > 0) {
          setView(currentView);
          if (msg.violations > 0) {
            document.getElementById('status-text').textContent = '已连接 · 🚨 ' + msg.violations + ' 条新违规';
            setTimeout(() => { document.getElementById('status-text').textContent = '已连接'; }, 5000);
          }
        }
      } catch(_) {}
    };
    _ws.onclose = () => { setTimeout(() => { if (API && KEY) _connectWebSocket(); }, 10000); };
    _ws.onerror = () => { _ws = null; };
  } catch(_) {}
}

function setView(v) {
  currentView = v;
  violationsOnly = (v === 'violations');
  page = 0;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`.nav-item[onclick="setView('${v}')"]`).classList.add('active');
  document.getElementById('detail-panel').classList.remove('open');
  if (!API) return;
  if (v === 'overview') renderOverview();
  else renderTable();
}

async function renderOverview() {
  document.getElementById('content').innerHTML = '<div class="loading">加载中…</div>';
  try {
    const s   = await apiFetch('/api/status');
    const d   = await apiFetch('/api/records', '?limit=200&violations_only=false');
    const recs = d.records;

    // Compute stats
    const violations = recs.filter(r => !(r.R_t1 || r['R_t+1'] || {}).passed);
    const vRate = s.total_records > 0 ? (s.violations / s.total_records * 100).toFixed(1) : 0;
    const skills = {};
    recs.forEach(r => {
      const sk = (r.U_t || {}).skill || '?';
      if (!skills[sk]) skills[sk] = {total:0, viols:0};
      skills[sk].total++;
      const rt1 = r['R_t+1'] || {};
      if (!rt1.passed) skills[sk].viols++;
    });

    // Recent violations
    const recentViols = recs.filter(r => !(r['R_t+1'] || {}).passed).slice(-5).reverse();

    let html = `
    <div class="stats">
      <div class="stat-card"><div class="label">总记录数</div><div class="value blue">${s.total_records}</div></div>
      <div class="stat-card"><div class="label">违规数</div><div class="value red">${s.violations}</div></div>
      <div class="stat-card"><div class="label">违规率</div><div class="value amber">${vRate}%</div></div>
      <div class="stat-card"><div class="label">最高 seq</div><div class="value">${s.highest_seq}</div></div>
    </div>

    <div class="table-wrap" style="margin-bottom:16px">
      <div class="table-header"><h3>Skill 分布</h3></div>
      <table><thead><tr><th>Skill</th><th>调用次数</th><th>违规</th><th>违规率</th><th>状态</th></tr></thead><tbody>
      ${Object.entries(skills).sort((a,b) => b[1].viols - a[1].viols).map(([sk, st]) => {
        const r = st.total > 0 ? (st.viols/st.total*100).toFixed(0) : 0;
        const badge = st.viols === 0 ? 'pass' : r > 30 ? 'fail' : 'warn';
        const label = st.viols === 0 ? 'OK' : r > 30 ? 'HIGH' : 'WATCH';
        return `<tr><td>${sk}</td><td>${st.total}</td><td>${st.viols}</td><td>${r}%</td>
                <td><span class="badge ${badge}">${label}</span></td></tr>`;
      }).join('')}
      </tbody></table>
    </div>

    <div class="table-wrap">
      <div class="table-header"><h3>最近违规</h3>
        <button class="btn sm ghost" onclick="setView('violations')">查看全部</button></div>
      <table><thead><tr><th>seq</th><th>时间</th><th>Skill</th><th>严重度</th><th>违规类型</th></tr></thead><tbody>
      ${recentViols.length === 0 ? '<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:24px">暂无违规</td></tr>' :
        recentViols.map(r => rowHtml(r)).join('')}
      </tbody></table>
    </div>`;

    document.getElementById('content').innerHTML = html;
    document.getElementById('content').querySelectorAll('tbody tr[data-seq]').forEach(tr =>
      tr.addEventListener('click', () => showDetail(parseInt(tr.dataset.seq)))
    );
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="empty">加载失败：' + e.message + '</div>';
  }
}

async function renderTable() {
  document.getElementById('content').innerHTML = '<div class="loading">加载中…</div>';
  try {
    const vParam = violationsOnly ? '&violations_only=true' : '';
    const d = await apiFetch('/api/records', `?limit=${pageSize}&offset=${page*pageSize}${vParam}`);
    allRecords = d.records;
    totalCount = d.total;

    const totalPages = Math.ceil(totalCount / pageSize);
    let html = `
    <div class="table-wrap">
      <div class="table-header">
        <h3>${violationsOnly ? '🚨 违规记录' : '📋 所有记录'}</h3>
        <span style="font-size:11px;color:var(--muted)">${totalCount} 条</span>
      </div>
      <table><thead><tr><th>seq</th><th>时间</th><th>Skill</th><th>Action</th><th>结果</th><th>严重度</th></tr></thead>
      <tbody>${allRecords.map(r => rowHtml(r)).join('')}</tbody></table>
      <div class="pagination">
        <span class="page-info">第 ${page+1} / ${Math.max(1,totalPages)} 页</span>
        ${page > 0 ? `<button class="btn sm ghost" onclick="goPage(${page-1})">← 上一页</button>` : ''}
        ${page < totalPages-1 ? `<button class="btn sm" onclick="goPage(${page+1})">下一页 →</button>` : ''}
      </div>
    </div>`;

    document.getElementById('content').innerHTML = html;
    document.getElementById('content').querySelectorAll('tbody tr[data-seq]').forEach(tr =>
      tr.addEventListener('click', () => showDetail(parseInt(tr.dataset.seq)))
    );
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="empty">加载失败：' + e.message + '</div>';
  }
}

function rowHtml(r) {
  const rt1  = r['R_t+1'] || {};
  const ut   = r.U_t || {};
  const xt   = r.X_t || {};
  const seq  = (r._integrity || {}).seq ?? '?';
  const ts   = (r.timestamp || '').slice(0,19).replace('T',' ');
  const skill = (ut.skill || '?').split('.').pop();
  const ac   = xt.action_class || '—';
  const pass = rt1.passed !== false;
  const sev  = rt1.overall_severity || 0;
  const badge = pass ? '<span class="badge pass">PASS</span>' : '<span class="badge fail">FAIL</span>';
  const sevColor = sev >= 0.8 ? 'var(--red)' : sev >= 0.5 ? 'var(--amber)' : 'var(--muted)';
  const sevStr = pass ? '—' : `<span style="color:${sevColor}">${sev.toFixed(2)}</span>`;
  return `<tr data-seq="${seq}">
    <td class="mono">${seq}</td>
    <td class="mono">${ts}</td>
    <td>${skill}</td>
    <td><span style="color:var(--purple);font-size:11px">${ac}</span></td>
    <td>${badge}</td>
    <td>${sevStr}</td>
  </tr>`;
}

function showDetail(seq) {
  const r = allRecords.find(x => ((x._integrity||{}).seq) === seq) ||
            allRecords.find(x => String(((x._integrity||{}).seq)) === String(seq));
  if (!r) return;

  const fmt = obj => JSON.stringify(obj, null, 2);
  const rt1 = r['R_t+1'] || {};
  const viols = (rt1.violations || []);
  const violHtml = viols.map(v =>
    `<div class="violation-item"><span class="vtype">${v.type||'?'}</span>  ${v.message||''}</div>`
  ).join('');

  document.getElementById('cieu-grid').innerHTML = `
    <div class="cieu-block"><div class="title">X_t · Context</div><pre>${fmt(r.X_t||{})}</pre></div>
    <div class="cieu-block"><div class="title">U_t · Action</div><pre>${fmt(r.U_t||{})}</pre></div>
    <div class="cieu-block"><div class="title">Y*_t · Intent Contract</div><pre>${fmt(r.Y_star_t||{})}</pre></div>
    <div class="cieu-block"><div class="title">Y_t+1 · Outcome</div><pre>${fmt(r['Y_t+1']||{})}</pre></div>
    <div class="cieu-block" style="grid-column:1/-1">
      <div class="title">R_t+1 · Assessment  
        <span style="margin-left:8px" class="badge ${rt1.passed!==false?'pass':'fail'}">${rt1.passed!==false?'PASS':'FAIL'}</span>
        ${rt1.overall_severity ? `<span style="margin-left:6px;color:var(--amber)">severity ${rt1.overall_severity.toFixed(2)}</span>` : ''}
      </div>
      <pre>${fmt({...rt1, violations: undefined})}</pre>
      ${violHtml}
    </div>`;

  const panel = document.getElementById('detail-panel');
  panel.classList.add('open');
  panel.scrollIntoView({behavior:'smooth'});
}

function goPage(n) { page = n; renderTable(); }

// Auto-connect if values pre-filled
window.addEventListener('load', () => {
  const ep = document.getElementById('inp-endpoint').value;
  if (ep) {
    // Don't auto-connect — wait for user to enter key
  }
});
</script>
</body>
</html>
